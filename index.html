<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopify Assistant (TinyLlama)</title>

  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0d1117;
      --text: #c9d1d9;
      --user-bg: #238636;
      --bot-bg: #30363d;
      --input-bg: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --header-bg: #010409;
      --status-bg: #165a24;
      --btn-text: #ffffff;
      --dot: rgba(255,255,255,0.25);
      --danger: #ef4444;
      --warn: #f59e0b;
    }
    :root[data-theme="light"] {
      --bg: #ffffff;
      --text: #1f2937;
      --user-bg: #e6ffed;
      --bot-bg: #f3f4f6;
      --input-bg: #f3f4f6;
      --border: #d1d5db;
      --accent: #2563eb;
      --header-bg: #f9fafb;
      --status-bg: #b8f3c4;
      --btn-text: #ffffff;
      --dot: rgba(0,0,0,0.18);
      --danger: #dc2626;
      --warn: #d97706;
    }

    body {
      margin: 0;
      font-family: 'Poppins', system-ui, sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(var(--dot) 1px, transparent 1px);
      background-size: 15px 15px;
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 16px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 { margin: 0; font-size: 1.2rem; display:flex; align-items:center; gap:10px; }
    .badge {
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--input-bg);
      color: var(--text);
      font-weight: 600;
    }

    .header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }

    #status {
      padding: 10px 14px;
      background: var(--status-bg);
      color: var(--text);
      text-align: center;
      font-size: 0.92rem;
      border-bottom: 1px solid var(--border);
    }

    #toolbar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content: space-between;
    }
    .toolbar-left, .toolbar-right { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

    .btn {
      padding: 9px 12px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
      display:flex;
      align-items:center;
      gap:8px;
      line-height: 1;
    }
    .btn:hover { filter: brightness(1.03); }
    .btn-primary {
      background: var(--accent);
      border-color: transparent;
      color: var(--btn-text);
    }
    .btn-warn { background: var(--warn); border-color: transparent; color: #111; }
    .btn-danger { background: var(--danger); border-color: transparent; color: #fff; }

    .pill {
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 88%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.48;
      word-break: break-word;
    }
    .user {
      align-self: flex-end;
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }
    .assistant {
      align-self: flex-start;
      background: var(--bot-bg);
      border-bottom-left-radius: 4px;
    }

    #input-area {
      padding: 12px 16px;
      background: var(--header-bg);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items:flex-end;
    }
    #user-input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      resize: none;
      min-height: 46px;
      max-height: 180px;
      font-family: inherit;
    }
    #send-btn {
      height: 46px;
      padding: 0 16px;
      background: var(--accent);
      color: var(--btn-text);
      border: none;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      min-width: 56px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #send-btn:disabled { background: #777; cursor:not-allowed; }

    pre, code {
      background: rgba(0,0,0,0.06);
      padding: 10px 12px;
      border-radius: 10px;
      overflow-x: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    :root[data-theme="dark"] pre, :root[data-theme="dark"] code { background: rgba(255,255,255,0.06); }

    .codebox {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--input-bg);
      margin-top: 8px;
    }
    .codebox-header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text);
      gap: 10px;
    }
    .codebox-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .codebox-btn {
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: var(--header-bg);
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
    }
    .codebox pre { margin: 0; }

    .muted { opacity: 0.8; font-size: 12px; }

    @media (max-width: 768px) {
      #chat-container { padding: 10px; }
      .message { max-width: 94%; }
      #toolbar { gap: 8px; }
      .btn { padding: 8px 10px; border-radius: 10px; }
      h1 { font-size: 1.05rem; }
    }
  </style>
</head>

<body>

<header>
  <h1>
    <span style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;background:var(--input-bg);border:1px solid var(--border);">
      🤖
    </span>
    Shopify Assistant
    <span class="badge">TinyLlama • WebLLM</span>
  </h1>

  <div class="header-right">
    <label class="pill" style="display:flex; align-items:center; gap:8px;">
      <input type="checkbox" id="low-vram" />
      Low VRAM
    </label>

    <button id="theme-toggle" class="btn" title="Toggle theme">🌓 Theme</button>
    <button id="reset-chat" class="btn btn-danger" title="Reset chat">♻ Reset</button>
  </div>
</header>

<div id="status">Loading TinyLlama… (first download can take a while)</div>

<div id="toolbar">
  <div class="toolbar-left">
    <span class="pill">Quick Actions:</span>
    <button class="btn" data-prompt="theme">🧱 theme.liquid</button>
    <button class="btn" data-prompt="product-template">🛍️ Product template</button>
    <button class="btn" data-prompt="section">🧩 Section</button>
    <button class="btn" data-prompt="snippet">🧷 Snippet</button>
    <button class="btn" data-prompt="cart-drawer">🛒 Cart drawer</button>
  </div>

  <div class="toolbar-right">
    <span class="pill" id="file-count">Files captured: 0</span>
    <button id="export-zip" class="btn btn-warn">⬇ Export ZIP</button>
  </div>
</div>

<div id="chat-container"></div>

<div id="input-area">
  <textarea id="user-input" rows="1" placeholder="Tell me what you want to build (Liquid/sections/snippets/templates)…"></textarea>
  <button id="send-btn" disabled title="Send">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script type="module">
  import { MLCEngine } from "https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.80/+esm";

  const MODEL_ID = "TinyLlama-1.1B-Chat-v1.0-q4f32_1-MLC";

  const statusEl      = document.getElementById("status");
  const chatContainer = document.getElementById("chat-container");
  const userInput     = document.getElementById("user-input");
  const sendBtn       = document.getElementById("send-btn");
  const lowVramEl     = document.getElementById("low-vram");
  const themeToggle   = document.getElementById("theme-toggle");
  const resetBtn      = document.getElementById("reset-chat");
  const exportBtn     = document.getElementById("export-zip");
  const fileCountEl   = document.getElementById("file-count");

  let engine = null;
  let engineReady = false;
  let generating = false;

  // Captured generated files (from assistant)
  const fileMap = new Map();

  function updateFileCount(){
    fileCountEl.textContent = `Files captured: ${fileMap.size}`;
  }

  function autoResize(){
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 180) + "px";
  }
  userInput.addEventListener("input", autoResize);

  userInput.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  // Theme toggle persistence
  (function initTheme(){
    const saved = localStorage.getItem("shopify_assistant_theme");
    const theme = (saved === "light" || saved === "dark") ? saved : "light";
    document.documentElement.setAttribute("data-theme", theme);
  })();
  themeToggle.addEventListener("click", ()=>{
    const current = document.documentElement.getAttribute("data-theme") || "light";
    const next = current === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("shopify_assistant_theme", next);
  });

  resetBtn.addEventListener("click", ()=>{
    if(generating) return;
    chatContainer.innerHTML = "";
    fileMap.clear();
    updateFileCount();
    messages = [ systemMessage() ];
    addMessage("assistant",
`Reset complete ✅

Tell me what you want:
- "Create a Dawn-like base theme with header/footer groups"
- "Build a product template with metafields + sticky ATC"
- "Create a cart drawer with ajax updates"
- "Make a reusable section with blocks + schema"

When you want exportable files, ask:
**"Output as files"**`);
  });

  function systemMessage(){
    return {
      role: "system",
      content: `
You are "Shopify Assistant", an expert Shopify theme engineer.
Goal: generate FULLY FUNCTIONAL Shopify theme code (Online Store 2.0) using Liquid + JSON templates + sections + snippets + assets JS/CSS.

Hard rules:
1) When user asks for theme files, output in FILE BLOCKS using this exact format so the app can export as ZIP:

\`\`\`file: layout/theme.liquid
...content...
\`\`\`

\`\`\`file: templates/product.json
...content...
\`\`\`

2) Prefer {% render %} over {% include %}. Use section groups: header-group, footer-group.
3) Use routes.* for URLs, and cart endpoints /cart/add.js /cart/change.js /cart/update.js as needed.
4) Use safe fallbacks (blank checks). Use settings schema correctly.
5) Shopify limitations:
   - Checkout is not Liquid-editable on most plans (use checkout extensibility if asked; otherwise provide storefront-only code).
6) Keep outputs concise but complete and production-ready.

If user requests "output as files", always produce the necessary file blocks.
`
    };
  }

  let messages = [ systemMessage() ];

  function addMessage(role, content){
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.innerHTML = marked.parse(content || "");
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    enhanceCodeBlocks(div);
    updateFileCount();
    return div;
  }

  function setStatus(text){
    statusEl.textContent = text;
  }

  // ---------- FILE CAPTURE (robust) ----------
  // Captures from raw assistant text while streaming + on completion.
  function captureFilesFromText(text){
    const re = /```file:\s*([^\n\r]+)\s*[\r\n]+([\s\S]*?)```/g;
    let m, count = 0;
    while((m = re.exec(text)) !== null){
      const path = (m[1] || "").trim().replace(/^\/+/, "");
      const body = (m[2] || "").replace(/\s+$/,"");
      if(path){
        fileMap.set(path, body);
        count++;
      }
    }
    if(count) updateFileCount();
    return count;
  }

  // ---------- Code box enhancer ----------
  function enhanceCodeBlocks(container){
    const blocks = container.querySelectorAll("pre > code");
    blocks.forEach(code=>{
      const pre = code.parentElement;
      if(pre.parentElement && pre.parentElement.classList.contains("codebox")) return;

      const src = code.textContent || "";
      const langClass = Array.from(code.classList).find(c => c.startsWith("language-"));
      const lang = langClass ? langClass.replace("language-","").toUpperCase() : "CODE";

      const wrap = document.createElement("div");
      wrap.className = "codebox";

      const header = document.createElement("div");
      header.className = "codebox-header";

      const left = document.createElement("div");
      left.innerHTML = `<strong>${lang}</strong>`;

      const actions = document.createElement("div");
      actions.className = "codebox-actions";

      const copyBtn = document.createElement("button");
      copyBtn.className = "codebox-btn";
      copyBtn.textContent = "Copy";

      copyBtn.addEventListener("click", async ()=>{
        try{
          await navigator.clipboard.writeText(src);
          copyBtn.textContent = "Copied";
          setTimeout(()=>copyBtn.textContent="Copy", 900);
        }catch{
          copyBtn.textContent = "Copy failed";
          setTimeout(()=>copyBtn.textContent="Copy", 900);
        }
      });

      actions.appendChild(copyBtn);
      header.appendChild(left);
      header.appendChild(actions);

      wrap.appendChild(header);
      wrap.appendChild(pre.cloneNode(true));
      pre.replaceWith(wrap);
    });
  }

  // ---------- Quick prompts ----------
  const quickPrompts = {
    "theme": `Output as files: Create a Dawn-like Online Store 2.0 base theme skeleton.
Requirements:
- layout/theme.liquid with content_for_header, content_for_layout, routes usage.
- sections/header-group.json and sections/footer-group.json (section groups).
- minimal sections: main-product.liquid, main-collection.liquid, main-cart.liquid.
- snippets: price.liquid, product-card.liquid, icon.liquid
- assets: base.css, global.js (basic).
Use safe fallbacks and production-ready structure.`,
    "product-template": `Output as files: Create templates/product.custom.json + section sections/main-product-custom.liquid.
Features:
- media gallery area, product form, quantity, ATC button
- dynamic metafields example: product.metafields.custom.subtitle, product.metafields.custom.key_features
- variant selector
- uses snippets/price.liquid
Also include any required assets JS for variant change.`,
    "section": `Output as files: Create a reusable section sections/hero-video.liquid with schema.
Settings: heading(text), subheading(richtext), video_url(url), image(image_picker), button_label(text), button_link(url)
Blocks: card: title(text) | text(textarea) | image(image_picker) | link(url)
Include @app blocks.`,
    "snippet": `Output as files: Create snippet snippets/price-with-badge.liquid
Inputs: product, variant, show_badge, class
Must show compare-at if on sale and a Sale badge.`,
    "cart-drawer": `Output as files: Build an AJAX cart drawer:
- snippets/cart-drawer.liquid
- sections/cart-drawer.liquid with schema (empty message, upsell title)
- assets/cart-drawer.js
Must support qty change with /cart/change.js and note with /cart/update.js.
Include an opener attribute: data-open-cart-drawer.`
  };

  document.querySelectorAll("[data-prompt]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const key = btn.getAttribute("data-prompt");
      const prompt = quickPrompts[key];
      if(!prompt) return;
      userInput.value = prompt;
      autoResize();
      userInput.focus();
    });
  });

  // ---------- Load TinyLlama ----------
  async function loadModel(){
    setStatus("Loading TinyLlama… downloading model files");
    sendBtn.disabled = true;
    userInput.disabled = true;

    try{
      engine = new MLCEngine({
        initProgressCallback: (report)=>{
          setStatus(report?.text || "Loading…");
        }
      });

      const chatOpts = lowVramEl.checked ? {
        context_window_size: 1024,
        sliding_window_size: -1,
        attention_sink_size: 128,
        temperature: 0.7
      } : {
        context_window_size: 2048,
        sliding_window_size: -1,
        attention_sink_size: 160,
        temperature: 0.7
      };

      await engine.reload(MODEL_ID, chatOpts);

      engineReady = true;
      setStatus(`Ready — Shopify Assistant (TinyLlama) ${lowVramEl.checked ? "(Low VRAM)" : "(Fast Mode)"}`);
      sendBtn.disabled = false;
      userInput.disabled = false;
      userInput.focus();

      addMessage("assistant",
`Loaded **Shopify Assistant (TinyLlama)** ✅

Ask me to generate Shopify theme code.
Tip: say **"Output as files"** to get exportable ZIP-ready file blocks.`);
    }catch(err){
      engineReady = false;
      setStatus("Error loading model: " + (err?.message || String(err)));
      addMessage("assistant", "Model load failed. Try enabling **Low VRAM** and refresh.");
      console.error(err);
    }
  }

  lowVramEl.addEventListener("change", ()=>{
    if(generating) return;
    loadModel();
  });

  // ---------- Send message ----------
  async function sendMessage(){
    const text = (userInput.value || "").trim();
    if(!text || generating) return;

    addMessage("user", text);
    userInput.value = "";
    autoResize();
    userInput.disabled = true;
    sendBtn.disabled = true;
    generating = true;

    messages.push({ role: "user", content: text });

    const replyDiv = addMessage("assistant", "");
    let fullText = "";

    try{
      if(engineReady && navigator.gpu){
        const stream = await engine.chat.completions.create({
          messages,
          stream: true,
          temperature: 0.7,
          max_gen_len: lowVramEl.checked ? 420 : 650
        });

        for await (const chunk of stream){
          const delta = chunk?.choices?.[0]?.delta?.content ?? "";
          if(!delta) continue;
          fullText += delta;

          // stream render
          replyDiv.innerHTML = marked.parse(fullText);
          chatContainer.scrollTop = chatContainer.scrollHeight;

          // continuously capture any completed file blocks
          captureFilesFromText(fullText);
        }

        messages.push({ role:"assistant", content: fullText });
        enhanceCodeBlocks(replyDiv);

        // final capture
        captureFilesFromText(fullText);
      } else {
        replyDiv.textContent = "WebGPU not available. Use a WebGPU-capable browser/device.";
      }
    }catch(err){
      const msg = err?.message || String(err);
      replyDiv.textContent = "Error: " + msg;
      console.error(err);
    }

    userInput.disabled = false;
    sendBtn.disabled = !engineReady;
    generating = false;
    userInput.focus();
  }

  // ---------- Base64 ZIP Export (NO server) ----------
  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error("Failed to read ZIP blob"));
      reader.onload = () => {
        const dataUrl = String(reader.result || "");
        const base64 = dataUrl.split(",")[1] || "";
        resolve(base64);
      };
      reader.readAsDataURL(blob);
    });
  }

  async function exportZipAsBase64(zipName = "shopify-theme.zip"){
    if(fileMap.size === 0){
      alert("No files captured yet.\n\nAsk the assistant: “Output as files …” so it produces ```file: path``` blocks.");
      return;
    }

    // Ensure we capture all file blocks visible in the chat HTML too (as backup)
    // (Main source is raw streamed text; this is extra safety.)
    const allText = chatContainer.innerText || "";
    captureFilesFromText(allText);

    const zip = new JSZip();
    for(const [path, content] of fileMap.entries()){
      const cleanPath = String(path || "").replace(/^\/+/, "");
      zip.file(cleanPath, content == null ? "" : String(content));
    }

    setStatus(`Exporting ZIP… (${fileMap.size} files)`);
    const blob = await zip.generateAsync({ type:"blob" });
    const base64 = await blobToBase64(blob);

    // Trigger download with Base64 data URL (no server)
    const dataUrl = `data:application/zip;base64,${base64}`;
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = zipName;
    a.rel = "noopener";
    document.body.appendChild(a);
    a.click();
    a.remove();

    setStatus(`Downloaded ZIP (${fileMap.size} files) ✅`);
    return base64;
  }

  exportBtn.addEventListener("click", async ()=>{
    try{
      await exportZipAsBase64("shopify-theme.zip");
    }catch(e){
      alert("Export failed: " + (e?.message || String(e)));
      setStatus("Export failed.");
    }
  });

  // Boot
  addMessage("assistant", "Initializing…");
  loadModel();
  updateFileCount();
</script>
</body>
</html>
